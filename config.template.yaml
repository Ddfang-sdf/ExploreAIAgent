llm:
  api_key: "your-api-key"
  base_url: "https://api.minimaxi.com/v1"    # 或 https://api.deepseek.com/v1
  model: "MiniMax-M2.7"                     # 或 deepseek-chat
  thinking: true                            # MiniMax 思考模式
  max_retries: 2
  # api_protocol: "anthropic"               # 可选 "openai"(默认) | "anthropic"
  #   Anthropic 协议时 base_url 应为 https://api.minimaxi.com/anthropic

exploration:
  compact_token_threshold: 10000            # 压缩触发 token 数，不设默认 8000

deep_explorer:
  enable: false
  max_tool_calls: 75
  loop_warning_threshold: 3

fast_explore:
  enable: false

tools:
  shell_max_output_bytes: 10240
  shell_max_output_lines: 500

workspace:
  path: "./workspace"
